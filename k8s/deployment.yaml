apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-rag-deployment
  labels:
    app: simple-rag
spec:
  replicas: 1 # Important: Because we use SQLite, we shouldn't scale beyond 1 replica safely without a shared volume that supports multiple concurrent writers properly, and even then SQLite handles it poorly. If you need more replicas, migrate to PostgreSQL.
  selector:
    matchLabels:
      app: simple-rag
  template:
    metadata:
      labels:
        app: simple-rag
    spec:
      containers:
        - name: simple-rag
          # Correct image name with underscore to match repo: simple_rag
          image: ghcr.io/devn913/simple_rag:latest 
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATA_DIR
              value: "/app/data"
            - name: DEBUG
              value: "True"
            - name: ALLOWED_HOSTS
              value: "*" 
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: simple-rag-secrets
                  key: google-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: simple-rag-secrets
                  key: database-url
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: simple-rag-pvc
